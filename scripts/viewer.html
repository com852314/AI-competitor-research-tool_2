<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>競品調研 Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .market-PH { background-color: #DEEBF7; }
    .market-BD { background-color: #FFF2CC; }
    .vendor-tag { font-size: 11px; padding: 1px 6px; border-radius: 3px; display: inline-block; }
    .v-JILI { background:#FFE699; color:#7F6000; }
    .v-PG-Soft, .v-PGSoft { background:#C6E0B4; color:#385723; }
    .v-Pragmatic-Play, .v-PragmaticPlay { background:#F4B084; color:#833C0C; }
    .v-FA-CHAI, .v-FACHAI { background:#FFC7CE; color:#9C0006; }
    .v-JDB { background:#B4C7E7; color:#1F4E79; }
    .v-HACKSAW { background:#E1D5E7; color:#5F2470; }
    .v-Habanero { background:#D9D9D9; color:#404040; }
    .v-Red-Tiger, .v-RedTiger { background:#FFB8B8; color:#7F0000; }
    .v-Playstar { background:#BDD7EE; color:#1F4E79; }
    .v-FTG { background:#D5DCE4; color:#404040; }
    .v-OmniPlay { background:#FFE699; color:#806000; }
    .v-default { background:#EDEDED; color:#595959; }
    .star-cross-platform { color:#E07700; }
    .drop-zone-active { background-color: #DBEAFE !important; border-color: #2563EB !important; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

<!-- 頂部 Header -->
<header class="bg-white border-b border-gray-200 px-6 py-4 sticky top-0 z-10 shadow-sm">
  <div class="flex items-center justify-between flex-wrap gap-3">
    <div>
      <h1 class="text-2xl font-bold text-blue-900">競品調研 Viewer <span class="text-sm font-normal text-gray-500">v1.0</span></h1>
      <p id="data-status" class="text-sm text-gray-500 mt-1">尚未載入資料</p>
    </div>
    <div class="flex items-center gap-2">
      <select id="week-selector" class="hidden border border-gray-300 rounded px-3 py-2 text-sm">
        <option value="">— 選擇週次 —</option>
      </select>
      <button id="reload-btn" class="hidden px-3 py-2 text-sm bg-gray-100 hover:bg-gray-200 rounded border border-gray-300">↻ 重新載入</button>
    </div>
  </div>
  <!-- Tabs -->
  <nav id="tabs" class="hidden mt-4 flex gap-1 border-b border-gray-200 -mb-4">
    <button class="tab-btn active px-4 py-2 text-sm font-medium border-b-2 border-blue-600 text-blue-700" data-tab="snapshot">📊 本週快照</button>
    <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-800" data-tab="cross">🌐 跨平台分析</button>
    <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-800" data-tab="master">📋 主表瀏覽</button>
    <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-800" data-tab="vendors">🏢 廠家對照</button>
    <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-800" data-tab="trend" disabled title="Phase 2D 將實作">📈 跨週趨勢</button>
  </nav>
</header>

<!-- 拖檔起始畫面 -->
<section id="drop-zone" class="max-w-3xl mx-auto mt-12 p-12 border-4 border-dashed border-gray-300 rounded-lg bg-white text-center">
  <div class="text-6xl mb-4">📁</div>
  <h2 class="text-xl font-semibold text-gray-700 mb-2">載入資料</h2>

  <!-- 主要方式：按鈕選資料夾 -->
  <div class="mt-6 flex flex-col items-center gap-3">
    <button id="pick-folder-btn" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded shadow">
      📂 選擇 data 資料夾
    </button>
    <div class="text-xs text-gray-400">或</div>
    <button id="pick-files-btn" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm rounded border border-gray-300">
      📄 選擇多個 JSON 檔
    </button>
  </div>

  <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none" accept=".json">
  <input type="file" id="files-input" multiple style="display:none" accept=".json">

  <!-- 備用方式：拖檔 -->
  <div class="mt-8 pt-6 border-t border-gray-200">
    <div class="text-sm text-gray-500 mb-2">或拖入資料夾 / 多個 JSON 檔到這裡</div>
    <div class="text-xs text-gray-400">（拖檔在某些瀏覽器/環境可能無效，建議用上方按鈕）</div>
  </div>

  <div id="load-progress" class="hidden mt-6 text-sm text-blue-600">載入中...</div>
  <div id="load-error" class="hidden mt-4 text-sm text-red-600"></div>
</section>

<!-- 主內容區 -->
<main id="main-content" class="hidden max-w-screen-2xl mx-auto p-6">
  <!-- Snapshot Tab -->
  <section id="tab-snapshot" class="tab-content">
    <div class="mb-4 flex items-center gap-3">
      <h2 class="text-xl font-bold">本週 Top 20 - 5 平台並排</h2>
      <span id="week-info" class="text-sm text-gray-500"></span>
    </div>
    <div id="snapshot-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4">
      <!-- 5 platform columns rendered by JS -->
    </div>
  </section>
  <!-- Other tabs (placeholder) -->
  <section id="tab-cross" class="tab-content hidden">
    <div class="space-y-8">
      <!-- ≥3 平台款 -->
      <div>
        <h2 class="text-xl font-bold mb-3 flex items-center gap-2">
          <span class="text-orange-500">★</span> ≥3 平台跨款（重點關注）
        </h2>
        <div id="cross-3plus"></div>
      </div>
      <!-- 2 平台款 -->
      <div>
        <h2 class="text-lg font-bold mb-3 text-gray-700">2 平台跨款（持續觀察）</h2>
        <div id="cross-2plus"></div>
      </div>
      <!-- 廠家市占 -->
      <div>
        <h2 class="text-xl font-bold mb-3">廠家在各平台 Top 20 佔比</h2>
        <div id="vendor-share"></div>
      </div>
      <!-- 觀察 -->
      <div>
        <h2 class="text-xl font-bold mb-3">本週重點觀察</h2>
        <div id="cross-observations" class="bg-blue-50 border border-blue-200 rounded p-4 text-sm"></div>
      </div>
    </div>
  </section>
  <section id="tab-master" class="tab-content hidden">
    <div class="flex items-center gap-3 mb-3 flex-wrap">
      <h2 class="text-xl font-bold">遊戲主表</h2>
      <span id="master-count" class="text-sm text-gray-500"></span>
      <div class="flex-1"></div>
      <input id="master-search" type="text" placeholder="搜尋遊戲名稱 / 廠家..." class="px-3 py-2 text-sm border border-gray-300 rounded w-64">
      <select id="master-filter-platforms" class="px-3 py-2 text-sm border border-gray-300 rounded">
        <option value="0">全部（不分跨平台數）</option>
        <option value="2">≥2 平台</option>
        <option value="3">≥3 平台</option>
        <option value="4">≥4 平台</option>
        <option value="5">5 平台</option>
      </select>
    </div>
    <div id="master-table-wrap" class="bg-white rounded border border-gray-200 overflow-x-auto"></div>
  </section>
  <section id="tab-vendors" class="tab-content hidden">
    <div class="flex items-center gap-3 mb-3 flex-wrap">
      <h2 class="text-xl font-bold">廠家對照表</h2>
      <span id="vendors-count" class="text-sm text-gray-500"></span>
      <div class="flex-1"></div>
      <input id="vendors-search" type="text" placeholder="搜尋廠家..." class="px-3 py-2 text-sm border border-gray-300 rounded w-64">
    </div>
    <div id="vendors-table-wrap" class="bg-white rounded border border-gray-200 overflow-x-auto"></div>
  </section>
  <section id="tab-trend" class="tab-content hidden"><div class="text-gray-400 text-center py-12">Phase 2D 將實作（需累積 2 週以上資料）</div></section>
</main>

<script>
// ===== 全域資料容器 =====
const STATE = {
  weekly: {},           // { "W1_2026-04-30.json": {...weekData}, ... }
  master: {
    games: null,
    vendors: null,
    platforms: null
  },
  currentWeek: null     // 當前選中的週次 key
};

const PLATFORM_ORDER = ['PT', 'BP', 'CP', 'TCG', 'BAJI'];

// ===== 載入機制 =====

// 1. 點按鈕選資料夾（最穩定）
document.getElementById('pick-folder-btn').addEventListener('click', () => {
  document.getElementById('folder-input').click();
});
document.getElementById('folder-input').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  await loadFiles(files);
});

// 2. 點按鈕選多個檔案
document.getElementById('pick-files-btn').addEventListener('click', () => {
  document.getElementById('files-input').click();
});
document.getElementById('files-input').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  await loadFiles(files);
});

// 3. 拖檔（備用）
const dropZone = document.getElementById('drop-zone');
document.addEventListener('dragenter', e => { e.preventDefault(); dropZone.classList.add('drop-zone-active'); });
document.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drop-zone-active'); });
document.addEventListener('dragleave', e => {
  if (e.target === document.documentElement || !e.relatedTarget) {
    dropZone.classList.remove('drop-zone-active');
  }
});
document.addEventListener('drop', async e => {
  e.preventDefault();
  dropZone.classList.remove('drop-zone-active');
  console.log('[viewer] drop event:', e.dataTransfer);
  const items = e.dataTransfer.items;
  const allFiles = [];
  if (items && items.length) {
    for (const it of items) {
      try {
        const entry = it.webkitGetAsEntry?.();
        if (entry) {
          await collectFiles(entry, allFiles);
        } else if (it.kind === 'file') {
          const f = it.getAsFile();
          if (f) allFiles.push(f);
        }
      } catch (err) { console.warn('drop item error', err); }
    }
  } else if (e.dataTransfer.files) {
    for (const f of e.dataTransfer.files) allFiles.push(f);
  }
  console.log('[viewer] dropped files:', allFiles.map(f => f.name));
  await loadFiles(allFiles);
});

async function collectFiles(entry, out) {
  if (entry.isFile) {
    const file = await new Promise(r => entry.file(r));
    out.push(file);
  } else if (entry.isDirectory) {
    const reader = entry.createReader();
    const entries = await new Promise((res, rej) => reader.readEntries(res, rej));
    for (const e of entries) await collectFiles(e, out);
  }
}

async function loadFiles(files) {
  const status = document.getElementById('data-status');
  const progress = document.getElementById('load-progress');
  const errorBox = document.getElementById('load-error');
  errorBox.classList.add('hidden');
  errorBox.textContent = '';
  progress.classList.remove('hidden');
  progress.textContent = `處理 ${files.length} 個檔案...`;

  console.log('[viewer] loadFiles:', files.length, 'files');
  let weeklyCount = 0;
  let parsedCount = 0;
  let skippedCount = 0;
  const errors = [];

  for (const f of files) {
    if (!f.name.endsWith('.json')) { skippedCount++; continue; }
    try {
      const text = await f.text();
      const json = JSON.parse(text);
      // 優先用「週快照」特徵判斷（含 week 數字）
      if (typeof json.week === 'number' && json.platforms && !Array.isArray(json.platforms)) {
        STATE.weekly[f.name] = json;
        weeklyCount++; parsedCount++;
        console.log(`[viewer] ✓ 週快照 W${json.week}:`, f.name);
      } else if (f.name === 'games.json' || (Array.isArray(json.games))) {
        STATE.master.games = json; parsedCount++;
        console.log(`[viewer] ✓ 主表 games:`, f.name);
      } else if (f.name === 'vendors.json' || (Array.isArray(json.vendors))) {
        STATE.master.vendors = json; parsedCount++;
        console.log(`[viewer] ✓ 主表 vendors:`, f.name);
      } else if (f.name === 'platforms.json' || (Array.isArray(json.platforms))) {
        STATE.master.platforms = json; parsedCount++;
        console.log(`[viewer] ✓ 主表 platforms:`, f.name);
      } else {
        skippedCount++;
        console.warn('[viewer] 無法分類:', f.name, Object.keys(json).slice(0,5));
      }
    } catch (err) {
      errors.push(`${f.name}: ${err.message}`);
      console.warn(`[viewer] 解析 ${f.name} 失敗`, err);
    }
  }
  progress.classList.add('hidden');

  console.log('[viewer] 結果:', {parsed: parsedCount, weekly: weeklyCount, skipped: skippedCount, errors: errors.length});

  if (parsedCount === 0) {
    errorBox.classList.remove('hidden');
    const msg = files.length === 0
      ? '沒有收到任何檔案。請點擊上方按鈕選擇 data 資料夾。'
      : `從 ${files.length} 個檔案中沒有找到有效的 JSON。${errors.length ? '錯誤：' + errors.slice(0,3).join(' | ') : ''}`;
    errorBox.textContent = msg;
    status.textContent = '⚠ 載入失敗';
    return;
  }
  // 顯示狀態
  const weekKeys = Object.keys(STATE.weekly).sort();
  const masterStatus = [
    STATE.master.games ? '主表✓' : '主表✗',
    STATE.master.vendors ? '廠家✓' : '廠家✗',
    STATE.master.platforms ? '平台✓' : '平台✗',
  ].join(' | ');
  status.textContent = `已載入 ${weekKeys.length} 週資料 | ${masterStatus}`;

  // 切換 UI
  document.getElementById('drop-zone').classList.add('hidden');
  document.getElementById('main-content').classList.remove('hidden');
  document.getElementById('tabs').classList.remove('hidden');

  // 更新週次選單
  const sel = document.getElementById('week-selector');
  sel.innerHTML = weekKeys.map(k => {
    const w = STATE.weekly[k];
    return `<option value="${k}">W${w.week} (${w.captureDate})</option>`;
  }).join('');
  sel.classList.remove('hidden');
  sel.value = weekKeys[weekKeys.length - 1] || '';
  STATE.currentWeek = sel.value;
  sel.onchange = () => { STATE.currentWeek = sel.value; renderActive(); };

  document.getElementById('reload-btn').classList.remove('hidden');
  document.getElementById('reload-btn').onclick = () => location.reload();

  renderActive();
}

// ===== Tab 切換 =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  if (btn.disabled) return;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('active', 'border-blue-600', 'text-blue-700');
      b.classList.add('border-transparent', 'text-gray-500');
    });
    btn.classList.remove('border-transparent', 'text-gray-500');
    btn.classList.add('active', 'border-blue-600', 'text-blue-700');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
    renderActive();
  });
});


function renderActive() {
  const active = document.querySelector('.tab-btn.active')?.dataset.tab;
  if (active === 'snapshot') renderSnapshot();
  else if (active === 'cross') renderCross();
  else if (active === 'master') renderMaster();
  else if (active === 'vendors') renderVendors();
}

// ===== 廠家 tag CSS class =====
function vendorClass(v) {
  if (!v) return 'v-default';
  const safe = String(v).replace(/[^A-Za-z0-9]/g, '-');
  return 'v-' + safe;
}

// ===== 跨平台款 ID 集合（≥3 平台）=====
function getCrossPlatformIds() {
  if (!STATE.master.games) return new Set();
  return new Set(
    STATE.master.games.games
      .filter(g => Object.values(g.platformAliases || {}).filter(v => v).length >= 3)
      .map(g => g.masterId)
  );
}

// ===== Render: 本週快照 =====
function renderSnapshot() {
  const grid = document.getElementById('snapshot-grid');
  const wk = STATE.weekly[STATE.currentWeek];
  if (!wk) {
    grid.innerHTML = '<div class="col-span-full text-center text-gray-400 py-8">請先選擇週次</div>';
    return;
  }
  document.getElementById('week-info').textContent = `W${wk.week} ・ ${wk.captureDate}`;

  const crossIds = getCrossPlatformIds();
  const html = PLATFORM_ORDER.map(code => {
    const p = wk.platforms[code];
    if (!p) return '';
    const marketCls = p.market === '孟加拉' ? 'market-BD' : 'market-PH';
    const rows = (p.rankings || []).map(r => {
      const isStar = r.masterId && crossIds.has(r.masterId);
      const star = isStar ? `<span class="star-cross-platform" title="≥3 平台跨款">★</span> ` : '';
      const newBadge = r.isNewToTop20 ? `<span class="text-xs bg-green-100 text-green-700 px-1 rounded ml-1">NEW</span>` : '';
      const vCls = vendorClass(r.vendor);
      const hasNote = !!(r.note);
      const chevron = hasNote ? `<span class="chevron text-gray-400 text-xs ml-1">▶</span>` : '';
      const clickable = hasNote ? 'cursor-pointer expandable' : '';
      const noteRow = hasNote ? `
        <tr class="note-detail hidden bg-amber-50">
          <td colspan="3" class="px-4 py-2 text-xs text-gray-700 border-b border-amber-200">
            <span class="font-medium text-gray-500">備註：</span>${escapeHtml(r.note)}
          </td>
        </tr>` : '';
      return `
        <tr class="row-main border-b border-gray-100 hover:bg-blue-50 ${clickable}">
          <td class="px-2 py-1 text-right text-gray-500 w-8">${r.rank}</td>
          <td class="px-2 py-1">${star}<span class="font-medium">${escapeHtml(r.name)}</span>${newBadge}${chevron}</td>
          <td class="px-2 py-1"><span class="vendor-tag ${vCls}">${escapeHtml(r.vendor || '')}</span></td>
        </tr>${noteRow}`;
    }).join('');
    return `
      <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
        <div class="px-3 py-2 ${marketCls} border-b border-gray-200">
          <div class="font-bold text-blue-900">${code}</div>
          <div class="text-xs text-gray-600">${p.market}</div>
        </div>
        <table class="w-full text-sm"><tbody>${rows}</tbody></table>
      </div>
    `;
  }).join('');
  grid.innerHTML = html;
  // 綁定點擊展開
  grid.querySelectorAll('tr.expandable').forEach(row => {
    row.addEventListener('click', () => {
      const next = row.nextElementSibling;
      const chev = row.querySelector('.chevron');
      if (next && next.classList.contains('note-detail')) {
        const wasHidden = next.classList.contains('hidden');
        next.classList.toggle('hidden');
        if (chev) chev.textContent = wasHidden ? '▼' : '▶';
      }
    });
  });
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ===== Render: 跨平台分析 =====
function renderCross() {
  const wk = STATE.weekly[STATE.currentWeek];
  if (!wk || !STATE.master.games) {
    document.getElementById('cross-3plus').innerHTML = '<div class="text-gray-400 text-sm">需要主表 + 週快照才能分析</div>';
    return;
  }

  // 收集所有跨平台款（讀主表 + 對照本週排名）
  const crossGames = STATE.master.games.games
    .map(g => {
      const aliases = g.platformAliases || {};
      const totalAliasCount = Object.values(aliases).filter(v => v).length;
      // 找本週排名
      const ranks = {};
      for (const code of PLATFORM_ORDER) {
        const r = wk.platforms[code]?.rankings?.find(rr => rr.masterId === g.masterId);
        if (r) ranks[code] = r.rank;
      }
      return { ...g, currentWeekPlatforms: Object.keys(ranks).length, ranks, totalAliasCount };
    })
    .filter(g => g.currentWeekPlatforms >= 2)
    .sort((a, b) => b.currentWeekPlatforms - a.currentWeekPlatforms || a.masterId - b.masterId);

  const cross3 = crossGames.filter(g => g.currentWeekPlatforms >= 3);
  const cross2 = crossGames.filter(g => g.currentWeekPlatforms === 2);
  document.getElementById('cross-3plus').innerHTML = renderCrossTable(cross3, true);
  document.getElementById('cross-2plus').innerHTML = renderCrossTable(cross2, false);
  document.getElementById('vendor-share').innerHTML = renderVendorShare(wk);
  document.getElementById('cross-observations').innerHTML = renderObservations(wk, cross3);
}

function renderCrossTable(games, highlight) {
  if (!games.length) return '<div class="text-gray-400 text-sm py-2">本週無此類遊戲</div>';
  const headerCls = highlight ? 'bg-amber-50' : 'bg-gray-50';
  return `
    <table class="w-full bg-white rounded border border-gray-200 text-sm">
      <thead class="${headerCls}">
        <tr>
          <th class="px-3 py-2 text-left text-gray-600">主表ID</th>
          <th class="px-3 py-2 text-left text-gray-600">遊戲名稱</th>
          <th class="px-3 py-2 text-left text-gray-600">廠家</th>
          <th class="px-3 py-2 text-center text-gray-600">平台數</th>
          ${PLATFORM_ORDER.map(c => `<th class="px-3 py-2 text-center text-gray-600">${c}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${games.map(g => `
          <tr class="border-t border-gray-100 hover:bg-blue-50">
            <td class="px-3 py-2 text-gray-500">${g.masterId}</td>
            <td class="px-3 py-2 font-medium">${highlight ? '<span class="text-orange-500">★</span> ' : ''}${escapeHtml(g.normalizedName)}</td>
            <td class="px-3 py-2"><span class="vendor-tag ${vendorClass(g.normalizedVendor)}">${escapeHtml(g.normalizedVendor)}</span></td>
            <td class="px-3 py-2 text-center font-bold ${highlight ? 'text-orange-600 text-base' : 'text-gray-600'}">${g.currentWeekPlatforms}</td>
            ${PLATFORM_ORDER.map(c => `<td class="px-3 py-2 text-center text-gray-500">${g.ranks[c] !== undefined ? g.ranks[c] : '—'}</td>`).join('')}
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function renderVendorShare(wk) {
  const html = PLATFORM_ORDER.map(code => {
    const p = wk.platforms[code];
    if (!p) return '';
    const counts = {};
    for (const r of p.rankings || []) {
      const v = r.vendor || '(未填)';
      counts[v] = (counts[v] || 0) + 1;
    }
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const total = sorted.reduce((s, [, n]) => s + n, 0);
    const bars = sorted.map(([v, n]) => {
      const pct = total > 0 ? (n / total * 100).toFixed(0) : 0;
      return `
        <div class="flex items-center gap-2 mb-1.5">
          <div class="w-24 text-xs flex-shrink-0"><span class="vendor-tag ${vendorClass(v)}">${escapeHtml(v)}</span></div>
          <div class="flex-1 bg-gray-100 rounded h-5 relative overflow-hidden">
            <div class="h-full ${vendorClass(v)}" style="width:${pct}%; opacity:0.6"></div>
            <span class="absolute left-2 top-0 text-xs leading-5 text-gray-700">${n} 款 (${pct}%)</span>
          </div>
        </div>
      `;
    }).join('');
    const marketCls = p.market === '孟加拉' ? 'text-orange-700' : 'text-blue-700';
    return `
      <div class="bg-white rounded border border-gray-200 p-3">
        <div class="font-bold mb-3 ${marketCls}">${code} <span class="text-xs text-gray-500 font-normal">(${p.market})</span></div>
        ${bars}
      </div>
    `;
  }).join('');
  return `<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">${html}</div>`;
}

function renderObservations(wk, cross3) {
  const obs = [];
  if (cross3.length > 0) {
    const top = cross3[0];
    obs.push(`本週 ≥3 平台款共 <b>${cross3.length}</b> 款，最強的是 <b>${escapeHtml(top.normalizedName)}</b>（出現 ${top.currentWeekPlatforms} 平台）`);
    if (cross3.filter(g => g.currentWeekPlatforms === 5).length > 0) {
      obs.push(`其中 <b>${cross3.filter(g => g.currentWeekPlatforms === 5).length}</b> 款達到 5 平台滿貫`);
    }
  } else {
    obs.push('本週無 ≥3 平台款（資料剛累積中）');
  }

  // 廠家總計
  const vendorAll = {};
  for (const code of PLATFORM_ORDER) {
    for (const r of (wk.platforms[code]?.rankings || [])) {
      const v = r.vendor || '(未填)';
      if (v === '(未填)' || v === '(待補)') continue;
      vendorAll[v] = (vendorAll[v] || 0) + 1;
    }
  }
  const topVendors = Object.entries(vendorAll).sort((a, b) => b[1] - a[1]).slice(0, 3);
  if (topVendors.length > 0) {
    obs.push(`市占前三廠家：${topVendors.map(([v, n]) => `<b>${escapeHtml(v)}</b>（${n} 款）`).join('、')}`);
  }

  // 新遊戲統計
  const newGameCount = PLATFORM_ORDER.reduce((s, c) => s + (wk.platforms[c]?.newGames?.length || 0), 0);
  if (newGameCount > 0) {
    obs.push(`本週新遊戲清單共 <b>${newGameCount}</b> 款（TCG NEW + BAJI New-Old）`);
  }

  // BP 獨立性
  const bpVendors = new Set();
  for (const r of wk.platforms.BP?.rankings || []) {
    if (r.vendor) bpVendors.add(r.vendor);
  }
  const otherPHVendors = new Set();
  for (const code of ['PT', 'CP', 'TCG']) {
    for (const r of wk.platforms[code]?.rankings || []) {
      if (r.vendor) otherPHVendors.add(r.vendor);
    }
  }
  const bpUnique = [...bpVendors].filter(v => !otherPHVendors.has(v));
  if (bpUnique.length > 2) {
    obs.push(`BP 平台獨家廠家有 <b>${bpUnique.length}</b> 個（${bpUnique.slice(0, 3).map(escapeHtml).join('、')}${bpUnique.length > 3 ? '…' : ''}），生態較獨立於其他菲律賓平台`);
  }

  return '<ul class="list-disc list-inside space-y-1.5">' + obs.map(o => `<li>${o}</li>`).join('') + '</ul>';
}


// ===== Render: 主表瀏覽 =====
let MASTER_SEARCH = '';
let MASTER_FILTER = 0;

function renderMaster() {
  if (!STATE.master.games) {
    document.getElementById('master-table-wrap').innerHTML = '<div class="text-gray-400 text-sm py-8 text-center">尚未載入遊戲主表</div>';
    return;
  }

  // 綁定搜尋與篩選（只綁一次）
  const searchEl = document.getElementById('master-search');
  const filterEl = document.getElementById('master-filter-platforms');
  if (!searchEl.dataset.bound) {
    searchEl.addEventListener('input', e => { MASTER_SEARCH = e.target.value.toLowerCase(); renderMasterTable(); });
    filterEl.addEventListener('change', e => { MASTER_FILTER = parseInt(e.target.value) || 0; renderMasterTable(); });
    searchEl.dataset.bound = '1';
  }
  searchEl.value = MASTER_SEARCH;
  filterEl.value = MASTER_FILTER;
  renderMasterTable();
}

function renderMasterTable() {
  const allGames = STATE.master.games.games || [];
  // 計算每款的跨平台數
  const augmented = allGames.map(g => {
    const aliases = g.platformAliases || {};
    const platforms = Object.entries(aliases).filter(([_, v]) => v).map(([k]) => k);
    return { ...g, _platforms: platforms, _count: platforms.length };
  });
  // 篩選
  let filtered = augmented;
  if (MASTER_FILTER > 0) {
    filtered = filtered.filter(g => g._count >= MASTER_FILTER);
  }
  if (MASTER_SEARCH) {
    filtered = filtered.filter(g =>
      (g.normalizedName || '').toLowerCase().includes(MASTER_SEARCH) ||
      (g.normalizedVendor || '').toLowerCase().includes(MASTER_SEARCH) ||
      Object.values(g.platformAliases || {}).some(v => v && String(v).toLowerCase().includes(MASTER_SEARCH))
    );
  }
  // 排序：平台數降 → 主表ID升
  filtered.sort((a, b) => b._count - a._count || a.masterId - b.masterId);

  document.getElementById('master-count').textContent = `共 ${allGames.length} 款，顯示 ${filtered.length} 款`;

  if (!filtered.length) {
    document.getElementById('master-table-wrap').innerHTML = '<div class="text-gray-400 text-sm py-8 text-center">沒有符合條件的遊戲</div>';
    return;
  }

  const html = `
    <table class="w-full text-sm">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-3 py-2 text-left text-gray-600">ID</th>
          <th class="px-3 py-2 text-left text-gray-600">正規化名稱</th>
          <th class="px-3 py-2 text-left text-gray-600">廠家</th>
          <th class="px-3 py-2 text-center text-gray-600">平台數</th>
          ${PLATFORM_ORDER.map(c => `<th class="px-3 py-2 text-left text-gray-600">${c} 名稱/ID</th>`).join('')}
          <th class="px-3 py-2 text-left text-gray-600">首次發現</th>
          <th class="px-3 py-2 text-left text-gray-600">備註</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(g => {
          const star = g._count >= 3 ? '<span class="text-orange-500">★</span> ' : '';
          const countCls = g._count >= 3 ? 'text-orange-600 font-bold' : (g._count === 2 ? 'text-blue-600 font-semibold' : 'text-gray-500');
          return `
            <tr class="border-t border-gray-100 hover:bg-blue-50">
              <td class="px-3 py-2 text-gray-500">${g.masterId}</td>
              <td class="px-3 py-2 font-medium">${star}${escapeHtml(g.normalizedName)}</td>
              <td class="px-3 py-2"><span class="vendor-tag ${vendorClass(g.normalizedVendor)}">${escapeHtml(g.normalizedVendor)}</span></td>
              <td class="px-3 py-2 text-center ${countCls}">${g._count}</td>
              ${PLATFORM_ORDER.map(c => `<td class="px-3 py-2 text-gray-600 text-xs">${escapeHtml(g.platformAliases?.[c] || '—')}</td>`).join('')}
              <td class="px-3 py-2 text-xs text-gray-500">${escapeHtml(g.firstSeen || '')}</td>
              <td class="px-3 py-2 text-xs text-gray-500">${escapeHtml(g.note || '')}</td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
  document.getElementById('master-table-wrap').innerHTML = html;
}

// ===== Render: 廠家對照 =====
let VENDORS_SEARCH = '';

function renderVendors() {
  if (!STATE.master.vendors) {
    document.getElementById('vendors-table-wrap').innerHTML = '<div class="text-gray-400 text-sm py-8 text-center">尚未載入廠家對照表</div>';
    return;
  }
  const searchEl = document.getElementById('vendors-search');
  if (!searchEl.dataset.bound) {
    searchEl.addEventListener('input', e => { VENDORS_SEARCH = e.target.value.toLowerCase(); renderVendorsTable(); });
    searchEl.dataset.bound = '1';
  }
  searchEl.value = VENDORS_SEARCH;
  renderVendorsTable();
}

function renderVendorsTable() {
  const all = STATE.master.vendors.vendors || [];
  let filtered = all;
  if (VENDORS_SEARCH) {
    filtered = filtered.filter(v => {
      const blob = JSON.stringify(v).toLowerCase();
      return blob.includes(VENDORS_SEARCH);
    });
  }
  document.getElementById('vendors-count').textContent = `共 ${all.length} 個廠家，顯示 ${filtered.length} 個`;

  if (!filtered.length) {
    document.getElementById('vendors-table-wrap').innerHTML = '<div class="text-gray-400 text-sm py-8 text-center">沒有符合條件的廠家</div>';
    return;
  }

  const renderPlatformCell = (data) => {
    if (!data) return '<span class="text-gray-300">—</span>';
    if (typeof data === 'object') {
      const url = data.urlCode ? `<code class="text-[10px] text-blue-700">${escapeHtml(data.urlCode)}</code>` : '';
      const disp = data.display ? `<span>${escapeHtml(data.display)}</span>` : '';
      return [url, disp].filter(Boolean).join('<br>');
    }
    return escapeHtml(String(data));
  };

  const html = `
    <table class="w-full text-sm">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-3 py-2 text-left text-gray-600">正規化名稱</th>
          ${PLATFORM_ORDER.map(c => `<th class="px-3 py-2 text-left text-gray-600">${c}</th>`).join('')}
          <th class="px-3 py-2 text-left text-gray-600">備註</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(v => `
          <tr class="border-t border-gray-100 hover:bg-blue-50">
            <td class="px-3 py-2"><span class="vendor-tag ${vendorClass(v.normalizedName)}">${escapeHtml(v.normalizedName)}</span></td>
            ${PLATFORM_ORDER.map(c => `<td class="px-3 py-2 text-xs text-gray-700">${renderPlatformCell(v.displayPerPlatform?.[c])}</td>`).join('')}
            <td class="px-3 py-2 text-xs text-gray-500">${escapeHtml(v.note || '')}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  document.getElementById('vendors-table-wrap').innerHTML = html;
}

</script>
</body>
</html>
